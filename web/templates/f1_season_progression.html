<!DOCTYPE html>
<!-- Declares this as an HTML5 document so the browser knows how to parse it -->
<html lang="en">
<!-- lang="en" tells browsers and screen readers this page is in English -->

<head>
  <!-- The <head> contains metadata and resources — nothing here is visually rendered directly -->

  <meta charset="UTF-8">
  <!-- Tells the browser to use UTF-8 character encoding, which supports special chars like é, ö, ü in driver names -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Makes the page scale correctly on mobile devices instead of zooming out to fit desktop width -->

  <title>F1 Championship Progression</title>
  <!-- Text shown in the browser tab -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <!-- Loads the D3.js library (version 7.8.5) from a CDN. D3 is used to draw the SVG chart (axes, lines, dots) -->

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Onest:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='variables.css') }}">
  <!-- Loads two Google Fonts:
       - Orbitron: the futuristic/racing font used for headings and numbers
       - DM Mono: the monospace font used for body text and labels
       display=swap means text shows in a fallback font while these load, preventing invisible text -->

  <style>
    /* ─────────────────────────────────────────────
       GLOBAL RESET
       ───────────────────────────────────────────── */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* Applies to every element and its pseudo-elements.
       box-sizing: border-box — padding and borders are included in an element's width/height (not added on top).
       margin: 0; padding: 0 — removes all default browser spacing so we start from a clean slate. */

    /* ─────────────────────────────────────────────
       CSS CUSTOM PROPERTIES (design tokens)
       These variables define the color palette and can be reused throughout the stylesheet.
       ───────────────────────────────────────────── */

    :root {
      /* :root targets the top-level <html> element; variables defined here are globally accessible via var(--name) */
      --bg: #0a0a0f;       /* Near-black page background */
      --surface: #111118;  /* Slightly lighter dark color for card/panel backgrounds */
      --border: #1e1e2e;   /* Subtle dark purple-tinted border color */
      --accent: #e10600;   /* F1's signature red — used for highlights and the champion label */
      --accent2: #ff6b35;  /* A secondary orange-red accent (defined but less used) */
      --text: #e8e8f0;     /* Near-white text with a slight blue tint */
      --muted: #5a5a7a;    /* Dim purple-gray for secondary/label text */
      --grid: #1a1a28;     /* Very dark color for chart grid lines */
      --label-font-size: 10px;
    }

    /* ─────────────────────────────────────────────
       BODY
       ───────────────────────────────────────────── */

    body {
      /*background: var(--bg);         /* Dark background using the CSS variable */
      background: var(--background-card-color);
      color: var(--text);            /* Default text color for the whole page */
      font-family: 'DM Mono', monospace; /* DM Mono as the default font; monospace as fallback */
      min-height: 100vh;             /* Makes the body at least as tall as the viewport */
      display: flex;                 /* Turns the body into a flex container */
      flex-direction: column;        /* Stacks children (header, controls, main) vertically */
    }

    /* ─────────────────────────────────────────────
       HEADER
       ───────────────────────────────────────────── */

    header {
      padding: 24px 40px 16px; /* Top 24px, sides 40px, bottom 16px of inner spacing */
      border-bottom: 1px solid var(--border); /* Thin dark line separating header from controls */
      display: flex;           /* Lays out logo and title side by side */
      align-items: center;     /* Vertically centers the logo and text */
      gap: 20px;               /* 20px space between the logo mark and the title text */
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent); /* Fills the shape with F1 red */
      clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);
      /* clip-path cuts the square into a pentagon shape with a notch in the bottom-right corner,
         giving a sleek geometric logo-like appearance */
      flex-shrink: 0; /* Prevents the logo from shrinking if the header gets narrow */
    }

    h1 {
      /*font-family: 'Orbitron', sans-serif; /* Racing-style font for the main title */
      font-family: var(--heading-font-family);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;   /* Wide letter spacing gives a bold, technical feel */
      text-transform: uppercase; /* Forces all letters to uppercase */
      color: var(--text);
    }

    h1 span {
      color: var(--accent); /* Colors the word "Fragility" in F1 red */
    }

    .subtitle {
      font-size: 10px;
      color: var(--muted);        /* Dimmer color for secondary info */
      letter-spacing: 0.15em;
      margin-top: 2px;            /* Small gap between title and subtitle */
    }

    /* ─────────────────────────────────────────────
       CONTROLS BAR (season selector + stats)
       ───────────────────────────────────────────── */

    .controls {
      padding: 16px 40px;
      display: flex;
      align-items: center;
      gap: 24px;                  /* Space between each control group */
      border-bottom: 1px solid var(--border); /* Line separating controls from the chart area */
      flex-wrap: wrap;            /* Wraps to a second row on small screens */
    }

    .control-group {
      display: flex;
      font-family: var(--body-font-family);
      font-size: var(--label-font-size);
      align-items: center;
      gap: 10px; /* Space between the "Season" label and the dropdown */
    }

    label {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);      /* Dimmed label color */
      text-transform: uppercase;
    }

    select {
      background: var(--secondary-gray-color);    /* Dark panel background for the dropdown */
      border: 1px solid var(--secondary-gray-color);
      color: var(--surface);
      /*font-family: 'DM Mono', monospace; /* Keeps the monospace font inside the dropdown */
      font-family: var(--body-font-family);
      font-size: 12px;
      padding: 6px 12px;
      appearance: none;              /* Removes the browser's default dropdown arrow styling */
      cursor: pointer;
      outline: none;                 /* Removes the browser's blue focus ring */
      transition: border-color 0.2s; /* Smooth color change on hover/focus */
    }

    select:hover, select:focus {
      border-color: var(--border); /* Highlights the dropdown border in red when active */
    }

    .stat-bar {
      margin-left: auto; /* Pushes the stats to the far right of the controls bar */
      display: flex;
      gap: 32px;         /* Space between each stat (Champion, Margin, Races) */
    }

    .stat {
      text-align: right; /* Aligns each stat's value and label to the right */
    }

    .stat-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent); /* Big red number for champion name, margin, race count */
      display: block;       /* Makes it sit on its own line above the label */
    }

    .stat-lbl {
      font-family: var(--body-font-family);
      font-size: var(--label-font-size);
      letter-spacing: 0.15em;
      color: var(--muted);   /* Dim label below each stat value */
      text-transform: uppercase;
    }

    /* ─────────────────────────────────────────────
       MAIN LAYOUT (chart + sidebar)
       ───────────────────────────────────────────── */

    .main {
      display: flex;   /* Places chart area and sidebar side by side */
      flex: 1;         /* Takes up all remaining vertical space after header and controls */
      overflow: hidden; /* Prevents scrollbars from appearing due to SVG sizing */
    }

    #chart-container {
      flex: 1;              /* Chart takes all available horizontal space */
      padding: 24px 32px 24px 16px; /* Inner spacing: top, right, bottom, left */
      position: relative;   /* Needed so the absolutely-positioned tooltip is anchored here */
    }

    svg {
      width: 100%;   /* SVG fills the entire chart container width */
      height: 100%;  /* SVG fills the entire chart container height */
    }

    /* ─────────────────────────────────────────────
       SIDEBAR (driver legend)
       ───────────────────────────────────────────── */

    .sidebar {
      width: 220px;      /* Fixed width for the legend panel */
      border-left: 1px solid var(--border); /* Vertical divider between chart and sidebar */
      padding: 20px 16px;
      overflow-y: auto;  /* Adds a scrollbar if there are more drivers than fit */
      flex-shrink: 0;    /* Prevents the sidebar from shrinking when the window is narrow */
    }

    .sidebar-title {
      font-family: var(--body-font-family);
      font-size: var(--label-font-size);
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--secondary-gray-color); /* Thin line below "DRIVERS" heading */
    }

    .driver-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      cursor: pointer;     /* Shows a hand cursor to indicate it's clickable */
      opacity: 0.9;        /* Slightly transparent by default */
      transition: opacity 0.15s; /* Smooth fade on hover */
    }

    .driver-item:hover { opacity: 1; } /* Full opacity on hover */
    .driver-item.dimmed { opacity: 0.25; } /* Very faded when the driver is toggled off */

    .driver-swatch {
      width: 3px;       /* Thin vertical color bar representing the driver's line color */
      height: 28px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .driver-info {
      flex: 1;          /* Takes up available space between swatch and points */
      min-width: 0;     /* Required for text-overflow: ellipsis to work inside a flex child */
    }

    .driver-name {
      font-family: var(--body-font-family);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;      /* Prevents name from wrapping to a second line */
      overflow: hidden;         /* Hides text that overflows */
      text-overflow: ellipsis;  /* Shows "..." when the name is too long */
    }

    .driver-team {
      font-family: var(--body-font-family);
      font-size: 10px;
      color: var(--muted);     /* Dimmer color for constructor/team name */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .driver-pts {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-align: right;
      flex-shrink: 0; /* Prevents the points number from being squeezed */
    }

    /* ─────────────────────────────────────────────
       D3 CHART ELEMENTS
       ───────────────────────────────────────────── */

    .axis text {
      fill: var(--muted);         /* Gray color for axis tick labels */
      /* font-family: 'DM Mono', monospace; */
      font-family: var(--body-font-family);
      font-size: 11px;
    }

    .axis line, .axis path {
      stroke: var(--border); /* Dark color for axis tick marks and baseline */
    }

    .grid line {
      stroke: var(--grid);         /* Very faint horizontal grid lines */
      stroke-dasharray: 2,4;       /* Dashed pattern: 2px dash, 4px gap */
    }

    .grid path { stroke: none; } /* Hides the outer border of the grid axis */

    .race-line {
      fill: none;         /* Lines are strokes only — no filled area */
      stroke-width: 2px;
      transition: stroke-width 0.15s, opacity 0.15s; /* Smooth transitions on hover/dim */
    }

    .race-line.highlighted { stroke-width: 3px; } /* Thicker line for highlighted driver */
    .race-line.dimmed { opacity: 0.08; }           /* Nearly invisible when toggled off */

    .dot {
      transition: r 0.15s, opacity 0.15s; /* Smooth radius and opacity changes */
      cursor: pointer; /* Hand cursor shows the dot is interactive */
    }

    .dot.dimmed { opacity: 0.08; } /* Fades out dots for hidden drivers */

    /* ─────────────────────────────────────────────
       HOVER TOOLTIP
       ───────────────────────────────────────────── */

    .tooltip {
      position: absolute;      /* Positioned relative to #chart-container */
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4.5px;
      padding: 10px 14px;
      font-size: 11px;
      pointer-events: none;    /* Tooltip doesn't intercept mouse events — crucial so hover still works on dots */
      opacity: 0;              /* Hidden by default */
      transition: opacity 0.15s; /* Fades in/out smoothly */
      z-index: 10;             /* Renders on top of chart elements */
      max-width: 200px;
    }

    .tooltip.visible { opacity: 1; } /* Class added by JS to show the tooltip */

    .tooltip-driver {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 4px; /* Space between driver name and the data rows */
    }

    .tooltip-row {
      display: flex;
      justify-content: space-between; /* Pushes label left and value right */
      gap: 16px;
      color: var(--muted);
      font-family: var(--body-font-family);
      font-size: 10px;
      margin-top: 2px;
    }

    .tooltip-row span:last-child { color: var(--text); } /* Value (right side) is brighter than label */

    /* ─────────────────────────────────────────────
       MISC CHART LABELS
       ───────────────────────────────────────────── */

    .race-label {
      fill: var(--muted);
      font-size: 9px;
      font-family: 'DM Mono', monospace;
    }

    .leader-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 700;
      fill: var(--accent); /* Red "WDC" badge next to the champion's line end */
      letter-spacing: 0.1em;
    }

    .champion-line {
      stroke-dasharray: none; /* Solid line (no dash) — placeholder class for potential use */
    }
  </style>
</head>

<body>

       HEADER
       ───────────────────────────────────────────── -->
  <header style="display: none;">
    <div class="logo-mark"></div>

    <div>
      <h1>F1 Championship <span>Fragility</span> Analysis</h1>
      <!-- "Fragility" is wrapped in <span> so it can be colored red separately -->
      <div class="subtitle">Team 75 · CSE 6242 · Season Progression</div>
      <!-- Project metadata shown below the title -->
    </div>
  </header>
  
    <h2 style="color: var(--border); font-family: var(--body-font-family); margin-bottom: 12px;">Cumulative Points Earned per Driver</h2>

      <select id="season-select"></select>

    <!-- Stats shown on the right side of the controls bar -->
    <div class="stat-bar">
      <div class="stat">
        <span class="stat-val" id="stat-champion">—</span>
        <!-- Champion's last name, updated by JS when a season is selected -->
        <span class="stat-lbl">Champion</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-margin">—</span>
        <!-- Points gap between 1st and 2nd, updated by JS -->
        <span class="stat-lbl">Winning Margin</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-races">—</span>
        <!-- Total number of races in the selected season, updated by JS -->
        <span class="stat-lbl">Races</span>
      </div>
    </div>
  </div>

  <!-- ─────────────────────────────────────────────
       MAIN CONTENT AREA
       ───────────────────────────────────────────── -->
  <div class="main">

    <!-- Chart area: D3 appends an <svg> here dynamically -->
    <div id="chart-container">
      <div class="tooltip" id="tooltip"></div>
      <!-- Floating tooltip box that appears on dot hover; content filled by JS -->
    </div>

    <!-- Sidebar: driver legend list -->
    <div class="sidebar">
      <div class="sidebar-title">Drivers</div>
      <div id="legend"></div>
      <!-- Driver items are injected here by JS for the selected season -->
    </div>
  </div>

      /* ═══════════════════════════════════════════════════════════════
       COLOR PALETTE
       10 colors assigned to drivers in order (index 0 = champion).
       Colors cycle if there are more than 10 drivers (using modulo).
       ═══════════════════════════════════════════════════════════════ */
    const COLORS = [
      '#e10600', // Red (champion)
      '#00d2be', // Teal
      '#ff8000', // Orange
      '#0090ff', // Blue
      '#dc0000', // Dark Red
      '#006f62', // Dark Teal
      '#2293d1', // Light Blue
      '#b6babd', // Silver/Gray
      '#f596c8', // Pink
      '#9b0000'  // Deep Red
    ];

    /* ═══════════════════════════════════════════════════════════════
       STATE VARIABLES
       Track which driver is highlighted and which are toggled off.
       ═══════════════════════════════════════════════════════════════ */
    let highlightedDriver = null; // Not currently used, but reserved for future highlight logic
    const dimmedDrivers = new Set(); // Stores indices of drivers the user has toggled off

    /* ═══════════════════════════════════════════════════════════════
       HELPER: shortRaceName
       Strips " Grand Prix" from race names to create compact axis labels.
       E.g. "Bahrain Grand Prix" → "Bahrain"
       ═══════════════════════════════════════════════════════════════ */
    function shortRaceName(name) {
      return name.replace(' Grand Prix', '').replace('Grand Prix', '');
      // Two replacements handle both "X Grand Prix" and standalone "Grand Prix"
    }

    /* ═══════════════════════════════════════════════════════════════
       MAIN RENDER FUNCTION
       Called on page load, season change, and window resize.
       Completely redraws the SVG chart and sidebar legend.
       ═══════════════════════════════════════════════════════════════ */
    function render(year) {
      // Get references to the DOM elements we'll need
      const container = document.getElementById('chart-container');
      const tooltip = document.getElementById('tooltip');
      const legend = document.getElementById('legend');
      const data = DATA[year]; // The season object for the selected year

      // ── RESET ──────────────────────────────────────────────────────
      d3.select('#chart-container svg').remove(); // Remove any existing SVG before redrawing
      legend.innerHTML = ''; // Clear the sidebar driver list
      highlightedDriver = null; // Reset highlight state
      dimmedDrivers.clear(); // Un-dim all drivers

      // ── DIMENSIONS ────────────────────────────────────────────────
      const W = container.clientWidth;  // Total chart container width in pixels
      const H = 0.9 * (container.clientHeight); // Total chart container height in pixels
      // Margins define the space reserved for axes (labels live outside the plot area)
      const margin = { top: 20, right: 50, bottom: 60, left: 52 };
      const w = W - margin.left - margin.right; // Inner plot width
      const h = H - margin.top - margin.bottom; // Inner plot height

      // ── CREATE SVG ────────────────────────────────────────────────
      const svg = d3.select('#chart-container')
        .append('svg')        // Appends an <svg> element inside #chart-container
        .attr('width', W)     // Full container width
        .attr('height', H);   // Full container height

      // Group element offset by margins — all chart content goes inside this <g>
      const g = svg.append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);
        // Moves the coordinate origin to the top-left of the inner plot area

      // ── DATA SHORTCUTS ────────────────────────────────────────────
      const races = data.races;   // Array of race name strings
      const series = data.series; // Array of driver point-series objects
      const n = races.length;     // Number of races this season

      // Find the highest point total across all drivers (used to scale the Y axis)
      const maxPts = d3.max(series, s => d3.max(s.points));

      // ── SCALES ────────────────────────────────────────────────────
      // X scale: maps race indices (0, 1, 2...) to pixel positions across the plot width
      const x = d3.scalePoint()
        .domain(d3.range(n))  // Input: 0, 1, 2, ..., n-1
        .range([0, w])        // Output: pixels from left edge to right edge
        .padding(0.1);        // Adds 10% padding so first/last dots aren't on the axis edge

      // Y scale: maps point values to pixel heights (inverted — higher pts = lower pixel y)
      const y = d3.scaleLinear()
        .domain([0, maxPts * 1.05]) // Input: 0 to 5% above max (breathing room)
        .range([h, 0]);             // Output: bottom of plot (h) to top (0) — SVG y increases downward

      // ── GRID LINES ────────────────────────────────────────────────
      g.append('g')
        .attr('class', 'grid')
        .call(
          d3.axisLeft(y)   // Creates a left-axis generator using the Y scale
            .tickSize(-w)  // Extends ticks horizontally across the full plot width (creating grid lines)
            .tickFormat('') // No labels on grid ticks (we label the Y axis separately below)
            .ticks(6)      // Aim for 6 horizontal grid lines
        );

      // ── X AXIS (race names along the bottom) ──────────────────────
      const xAxis = g.append('g')
        .attr('class', 'axis')
        .attr('transform', `translate(0,${h})`) // Moves axis to the bottom of the plot
        .call(d3.axisBottom(x).tickFormat(i => shortRaceName(races[i])));
        // tickFormat receives the domain value (race index) and returns a short race name

      // Style the rotated X axis labels so they don't overlap
      xAxis.selectAll('text')
        .style('text-anchor', 'end')  // Anchor text at its right end before rotation
        .attr('dx', '-0.6em')         // Nudge slightly left after anchoring
        .attr('dy', '0.1em')          // Slight vertical adjustment
        .attr('transform', 'rotate(-40)') // Rotate 40° counterclockwise to save horizontal space
        .style('font-size', '10px')
        .style('fill', 'var(--muted)');

      // ── Y AXIS (points labels on the left) ────────────────────────
      g.append('g')
        .attr('class', 'axis')
        .call(
          d3.axisLeft(y)
            .ticks(6)                      // Show ~6 tick marks
            .tickFormat(d => d + ' pts')   // Append " pts" to each value (e.g. "100 pts")
        );

      // ── DRAW LINES AND DOTS FOR EACH DRIVER ───────────────────────
      // D3 line generator: converts an array of point values into an SVG path "d" string
      const lineGen = d3.line()
        .defined(d => d !== null)       // Skip null values (missing races) but continue the line
        .x((_, i) => x(i))  // X position: the race index mapped to pixels
        .y(d => y(d))        // Y position: the point value mapped to pixels
        .curve(d3.curveMonotoneX); // Smooth curve that preserves monotonicity (no weird loops)

      // Iterate over each driver's data
      series.forEach((s, idx) => {
        const color = COLORS[idx % COLORS.length]; // Cycle through colors if > 10 drivers
        const lineId = `line-${idx}`;   // Unique ID for this driver's line element
        const dotClass = `dot-${idx}`;  // Unique class for this driver's dots

        // Draw the cumulative points line
        g.append('path')
          .datum(s.points)           // Bind the points array as data for the line generator
          .attr('class', `race-line ${lineId}`) // CSS classes for styling + toggling
          .attr('id', lineId)        // ID used for future selection
          .attr('stroke', color)     // Driver's color
          .attr('d', lineGen)        // The "d" attribute is the SVG path string generated by lineGen
          .attr('data-driver', s.driver); // Store driver name in a data attribute (unused currently)

        // Draw dots at each race result for this driver
        // Filter: only create dots for races where the driver participated (points[i] != null)
        const dotsData = s.points
          .map((d, i) => ({ value: d, index: i }))
          .filter(item => item.value !== null);

        g.selectAll(`.${dotClass}`)       // Select (currently empty) set of dots with this class
          .data(dotsData)                 // Bind the filtered points array
          .enter().append('circle')       // For each data point, append a circle
          .attr('class', `dot ${dotClass}`) // CSS class for styling and toggling
          .attr('cx', d => x(d.index))    // X position: race index
          .attr('cy', d => y(d.value))    // Y position: point value
          .attr('r', 3)                   // Radius of 3px in normal state
          .attr('fill', color)
          .attr('data-driver', s.driver)

          // ── TOOLTIP: MOUSE OVER ──────────────────────────────────
          .on('mouseover', function(event, d) {
            const i = d.index; // Race index (already available in d)
            const curVal = d.value;
            // Calculate points earned in this race (difference from previous cumulative total)
            // Find the last non-null value before this race
            let prevVal = 0;
            for (let j = i - 1; j >= 0; j--) {
              if (s.points[j] !== null) {
                prevVal = s.points[j];
                break;
              }
            }
            const racePoints = curVal - prevVal;

            // Populate the tooltip HTML with race details
            tooltip.innerHTML = `
              <div class="tooltip-driver" style="color:${color}">${s.driver}</div>
              <div class="tooltip-row"><span>Race</span><span>${shortRaceName(races[i])}</span></div>
              <div class="tooltip-row"><span>Cumulative</span><span>${Math.round(d.value)} pts</span></div>
              <div class="tooltip-row"><span>This race</span><span>+${Math.round(racePoints)} pts</span></div>
              <div class="tooltip-row"><span>Constructor</span><span>${s.constructor}</span></div>
            `;
            tooltip.classList.add('visible'); // Fades the tooltip in via CSS transition
            d3.select(this).attr('r', 6);     // Enlarges the dot to 6px on hover
          })

          // ── TOOLTIP: MOUSE MOVE ──────────────────────────────────
          .on('mousemove', function(event) {
            const rect = container.getBoundingClientRect(); // Gets chart area position on screen
            let tx = event.clientX - rect.left + 12; // Tooltip X: cursor position + 12px offset
            let ty = event.clientY - rect.top - 10;  // Tooltip Y: cursor position - 10px offset

            // If tooltip would overflow the right edge, flip it to the left of the cursor
            if (tx + 200 > W) tx = event.clientX - rect.left - 210;

            tooltip.style.left = tx + 'px';
            tooltip.style.top = ty + 'px';
          })

          // ── TOOLTIP: MOUSE OUT ───────────────────────────────────
          .on('mouseout', function() {
            tooltip.classList.remove('visible'); // Fades the tooltip out
            d3.select(this).attr('r', 3);        // Shrinks the dot back to 3px
          });
      });

      // ── CHAMPION "WDC" BADGE ──────────────────────────────────────
      const champion = series[0]; // series[0] is always the champion (sorted by final points)
      const champColor = COLORS[0]; // Champion's color (always index 0 = red)

      g.append('text')
        .attr('class', 'leader-badge')
        .attr('x', x(n - 1) + 6)                     // Just to the right of the last race dot
        .attr('y', y(champion.final_points) + 4)     // Vertically aligned to the champion's final point
        .text('WDC')                                   // "World Drivers' Champion" label
        .style('fill', champColor)
        .style('font-size', '8px');

      // ── UPDATE STATS BAR ─────────────────────────────────────────
      const p1 = champion.final_points;     // Champion's final point total
      const p2 = series[1].final_points;   // Runner-up's final point total

      // Show only the last name (split on space, take last element)
      document.getElementById('stat-champion').textContent = champion.driver.split(' ').pop();
      // Winning margin rounded to nearest integer
      document.getElementById('stat-margin').textContent = Math.round(p1 - p2) + ' pts';
      // Number of races in the season
      document.getElementById('stat-races').textContent = n;

      // ── BUILD SIDEBAR LEGEND ─────────────────────────────────────
      series.forEach((s, idx) => {
        const color = COLORS[idx % COLORS.length];

        // Create a clickable driver item div
        const item = document.createElement('div');
        item.className = 'driver-item';

        // Build the inner HTML: color swatch, name/team, and final points
        item.innerHTML = `
          <div class="driver-swatch" style="background:${color}"></div>
          <div class="driver-info">
            <div class="driver-name">${s.driver}</div>
            <div class="driver-team">${s.constructor}</div>
          </div>
          <div class="driver-pts" style="color:${color}">${Math.round(s.final_points)}</div>
        `;

        // Clicking a driver item toggles their line/dots on or off
        item.addEventListener('click', () => toggleDriver(idx, item));

        legend.appendChild(item); // Add the item to the sidebar
      });
    }

    /* ═══════════════════════════════════════════════════════════════
       TOGGLE DRIVER VISIBILITY
       Called when a driver item in the sidebar is clicked.
       Adds/removes the driver index from dimmedDrivers and applies
       the "dimmed" CSS class to their line, dots, and legend item.
       ═══════════════════════════════════════════════════════════════ */
    function toggleDriver(idx, item) {
      // Note: these selectors grab all lines/dots currently in the SVG
      const lines = document.querySelectorAll('.race-line');
      const dots = document.querySelectorAll('.dot');
      const items = document.querySelectorAll('.driver-item');

      if (dimmedDrivers.has(idx)) {
        // Driver is currently dimmed → un-dim them
        dimmedDrivers.delete(idx);
        item.classList.remove('dimmed');
      } else {
        // Driver is currently visible → dim them
        dimmedDrivers.add(idx);
        item.classList.add('dimmed');
      }

      // Apply/remove 'dimmed' class to each line based on whether its index is in dimmedDrivers
      lines.forEach((line, i) => {
        line.classList.toggle('dimmed', dimmedDrivers.has(i));
        // toggle(className, force): adds class if force=true, removes if force=false
      });

      // Apply/remove 'dimmed' class to each dot
      // Dots are identified by their class "dot-N" where N is the driver index
      document.querySelectorAll('[class*="dot-"]').forEach(dot => {
        // Find the class that starts with "dot-" among all of this element's classes
        const cls = [...dot.classList].find(c => c.startsWith('dot-'));
        if (cls) {
          const i = parseInt(cls.replace('dot-', '')); // Extract the index from "dot-N"
          dot.classList.toggle('dimmed', dimmedDrivers.has(i));
        }
      });
    }

    /* ═══════════════════════════════════════════════════════════════
       SEASON SELECTOR SETUP
       Populates the <select> dropdown with years from the DATA object,
       sorted in descending order (newest first).
       ═══════════════════════════════════════════════════════════════ */
    const select = document.getElementById('season-select');

    Object.keys(DATA)
      .filter(y => parseInt(y) >= 2014) // Only include seasons from 2014 onwards
      .sort((a, b) => b - a) // Sort years descending: 2024, 2023, ..., 2014
      .forEach(y => {
        const opt = document.createElement('option'); // Create an <option> element
        opt.value = y;       // The value sent when this option is selected
        opt.textContent = y; // The text shown in the dropdown
        if (y === '2024') opt.selected = true; // Default to the most recent season
        select.appendChild(opt); // Add to the dropdown
      });

    // Re-render the chart whenever the user picks a different season
    select.addEventListener('change', () => render(select.value));

    /* ═══════════════════════════════════════════════════════════════
       INITIAL RENDER + RESIZE HANDLER
       ═══════════════════════════════════════════════════════════════ */
    render('2024'); // Draw the chart for the default season on page load

    // Re-render on window resize so the chart stays correctly sized
    // (clientWidth/clientHeight are read fresh each time render() is called)
    window.addEventListener('resize', () => render(select.value));
  </script>
</body>
</html>
