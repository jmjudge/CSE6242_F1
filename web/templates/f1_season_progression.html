<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Championship Progression</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Onest:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='variables.css') }}">

  <style>
    * , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* CSS variables */
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #e10600;
      --accent2: #ff6b35;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --grid: #1a1a28;
      --label-font-size: 10px;
    }

    body {
      background: var(--background-card-color);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 24px 40px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent);
      clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);
      flex-shrink: 0;
    }

    h1 {
      font-family: var(--heading-font-family);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-top: 2px;
    }

    .controls {
      padding: 16px 40px;
      display: flex;
      align-items: center;
      gap: 24px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      font-family: var(--body-font-family);
      font-size: var(--label-font-size);
      align-items: center;
      gap: 10px;
    }

    label {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    select {
      background: var(--secondary-gray-color);
      border: 1px solid var(--secondary-gray-color);
      color: var(--surface);
      font-family: var(--body-font-family);
      font-size: 12px;
      padding: 6px 12px;
      appearance: none;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    select:hover, select:focus {
      border-color: var(--border);
      cursor: pointer;
    }

    .stat-bar {
      margin-left: auto;
      display: flex;
      gap: 32px;
    }

    .stat {
      text-align: right;
    }

    .stat-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      display: block;
    }

    .stat-lbl {
      font-family: var(--body-font-family);
      font-size: var(--label-font-size);
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #chart-container {
      flex: 1;
      padding: 24px 32px 24px 16px;
      position: relative;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .sidebar {
      width: 220px;
      border-left: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-title {
      font-family: var(--body-font-family);
      font-size: var(--label-font-size);
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--secondary-gray-color);
    }

    .driver-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      cursor: pointer;
      opacity: 0.9;
      transition: opacity 0.15s;
    }

    .driver-item:hover { opacity: 1; } /* Full opacity on hover */
    .driver-item.dimmed { opacity: 0.25; } /* Very faded when the driver is toggled off */

    .driver-swatch {
      width: 3px;
      height: 28px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .driver-info {
      flex: 1;
      min-width: 0;
    }

    .driver-name {
      font-family: var(--body-font-family);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .driver-team {
      font-family: var(--body-font-family);
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .driver-pts {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-align: right;
      flex-shrink: 0;
    }

    .axis text {
      fill: var(--muted);
      font-family: var(--body-font-family);
      font-size: 11px;
    }

    .axis line, .axis path {
      stroke: var(--border);
    }

    .grid line {
      stroke: var(--grid);
      stroke-dasharray: 2,4;
    }

    .grid path { stroke: none; }

    .race-line {
      fill: none;
      stroke-width: 2px;
      transition: stroke-width 0.15s, opacity 0.15s;
    }

    .race-line.highlighted { stroke-width: 3px; }
    .race-line.dimmed { opacity: 0.08; }

    .dot {
      transition: r 0.15s, opacity 0.15s;
      cursor: pointer;
    }

    .dot.dimmed { opacity: 0.08; }

    /* Tooltip stuff */
    .tooltip {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4.5px;
      padding: 10px 14px;
      font-size: 11px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
      max-width: 200px;
    }

    .tooltip.visible { opacity: 1; }

    .tooltip-driver {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .tooltip-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-family: var(--body-font-family);
      font-size: 10px;
      margin-top: 2px;
    }

    .tooltip-row span:last-child { color: var(--text); }

    .race-label {
      fill: var(--muted);
      font-size: 9px;
      font-family: 'DM Mono', monospace;
    }

    .leader-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px;
      font-weight: 700;
      fill: var(--accent);
      letter-spacing: 0.1em;
    }

    .champion-line {
      stroke-dasharray: none;
    }
  </style>
</head>

<body>
  <header style="display: none;">
    <div class="logo-mark"></div>
    <div>
      <h1>F1 Championship <span>Fragility</span> Analysis</h1>
      <div class="subtitle">Team 75 · CSE 6242 · Season Progression</div>
    </div>
  </header>
  <h2 style="color: var(--border); font-family: var(--body-font-family); margin-bottom: 12px;">Cumulative Points Earned per Driver</h2>

  <div class="controls">
    <div class="control-group">
      <label>Season</label>
      <select id="season-select"></select>
    </div>

    <div class="stat-bar">
      <div class="stat">
        <span class="stat-val" id="stat-champion">—</span>
        <span class="stat-lbl">Champion</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-margin">—</span>
        <span class="stat-lbl">Winning Margin</span>
      </div>
      <div class="stat">
        <span class="stat-val" id="stat-races">—</span>
        <span class="stat-lbl">Races</span>
      </div>
    </div>
  </div>

  <div class="main">
    <div id="chart-container">
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="sidebar">
      <div class="sidebar-title">Drivers</div>
      <div id="legend"></div>
    </div>
  </div>

  <!-- static CSI visual --> 
  <section style="margin-top: 32px;">
    <h2 style="color: var(--border); font-family: var(--body-font-family); margin-bottom: 12px;">Baseline Simulation CSI</h2>

    <div style="display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start;">
      <div style="min-width: 220px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px;">
        <div style="font-size: 2.4rem; font-weight: 700; color: var(--accent);">
          {{ (baseline_sim.csi * 100) | round(2) }}%
        </div>
        <div style="margin-top: 8px; font-size: 0.95rem; color: var(--muted);">
          CSI for {{ baseline_sim.year }} ({{ baseline_sim.n_simulations }} runs)
        </div>
      </div>

      <div style="max-width: 260px; width: 100%;">
        <canvas id="baselineCsiChart" width="260" height="260"></canvas>
      </div>

    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
  (function() {
    const csi = {{ baseline_sim.csi | round(4) }};

    const donutCtx = document.getElementById("baselineCsiChart")?.getContext("2d");
    if (donutCtx) {
      new Chart(donutCtx, {
        type: "doughnut",
        data: {
          labels: ["CSI", "Champion probability"],
          datasets: [{
            data: [csi, 1 - csi],
            backgroundColor: ["#6366f1", "#60a5fa"],
            borderWidth: 0
          }]
        },
        options: {
          plugins: {
            title: { display: true, text: "Baseline CSI for selected season" },
            legend: { position: "bottom" }
          },
          cutout: "70%",
          responsive: true,
          maintainAspectRatio: false
        }
      });
    }

  
  })();
  </script>

    const DATA = {{ data | tojson }};
    const COLORS = [
      '#e10600', '#00d2be', '#ff8000', '#0090ff', '#dc0000',
      '#006f62', '#2293d1', '#b6babd', '#f596c8', '#9b0000'
    ];

    let highlightedDriver = null;
    const dimmedDrivers = new Set();

    function shortRaceName(name) { return name.replace(' Grand Prix', '').replace('Grand Prix', ''); }

    function render(year) {
      const container = document.getElementById('chart-container');
      const tooltip = document.getElementById('tooltip');
      const legend = document.getElementById('legend');
      const data = DATA[year];

      d3.select('#chart-container svg').remove();
      legend.innerHTML = '';
      highlightedDriver = null;
      dimmedDrivers.clear();

      const W = container.clientWidth;
    /*  const H = 0.9 * (container.clientHeight); */
      const H = container.clientHeight;
      const margin = { top: 20, right: 50, bottom: 60, left: 52 };
      const w = W - margin.left - margin.right;
      const h = H - margin.top - margin.bottom;

      const svg = d3.select('#chart-container')
        .append('svg')
        .attr('width', W)
        .attr('height', H);

      const g = svg.append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      const races = data.races;
      const series = data.series;
      const n = races.length;

      const maxPts = d3.max(series, s => d3.max(s.points));

      const x = d3.scalePoint()
        .domain(d3.range(n))
        .range([0, w])
        .padding(0.1);

      const y = d3.scaleLinear()
        .domain([0, maxPts * 1.05])
        .range([h, 0]);

      g.append('g')
        .attr('class', 'grid')
        .call(
          d3.axisLeft(y)
            .tickSize(-w)
            .tickFormat('')
            .ticks(6)
        );

      const xAxis = g.append('g')
        .attr('class', 'axis')
        .attr('transform', `translate(0,${h})`)
        .call(d3.axisBottom(x).tickFormat(i => shortRaceName(races[i])));

      xAxis.selectAll('text')
        .style('text-anchor', 'end')
        .attr('dx', '-0.6em')
        .attr('dy', '0.1em')
        .attr('transform', 'rotate(-40)')
        .style('font-size', '10px')
        .style('fill', 'var(--muted)');

      g.append('g')
        .attr('class', 'axis')
        .call(
          d3.axisLeft(y)
            .ticks(6)
            .tickFormat(d => d + ' pts')
        );

      const lineGen = d3.line()
        .defined(d => d !== null)
        .x((_, i) => x(i))
        .y(d => y(d))
        .curve(d3.curveMonotoneX);

      series.forEach((s, idx) => {
        const color = COLORS[idx % COLORS.length];
        const lineId = `line-${idx}`;
        const dotClass = `dot-${idx}`;

        g.append('path')
          .datum(s.points)
          .attr('class', `race-line ${lineId}`)
          .attr('id', lineId)
          .attr('stroke', color)
          .attr('d', lineGen)
          .attr('data-driver', s.driver);

        const dotsData = s.points
          .map((d, i) => ({ value: d, index: i }))
          .filter(item => item.value !== null);

        g.selectAll(`.${dotClass}`)
          .data(dotsData)
          .enter().append('circle')
          .attr('class', `dot ${dotClass}`)
          .attr('cx', d => x(d.index))
          .attr('cy', d => y(d.value))
          .attr('r', 3)
          .attr('fill', color)
          .attr('data-driver', s.driver)

          .on('mouseover', function(event, d) {
            const i = d.index;
            const curVal = d.value;
            let prevVal = 0;
            for (let j = i - 1; j >= 0; j--) {
              if (s.points[j] !== null) {
                prevVal = s.points[j];
                break;
              }
            }
            const racePoints = curVal - prevVal;

            tooltip.innerHTML = `
              <div class="tooltip-driver" style="color:${color}">${s.driver}</div>
              <div class="tooltip-row"><span>Race</span><span>${shortRaceName(races[i])}</span></div>
              <div class="tooltip-row"><span>Cumulative</span><span>${Math.round(d.value)} pts</span></div>
              <div class="tooltip-row"><span>This race</span><span>+${Math.round(racePoints)} pts</span></div>
              <div class="tooltip-row"><span>Constructor</span><span>${s.constructor}</span></div>
            `;
            tooltip.classList.add('visible');
            d3.select(this).attr('r', 6);
          })
          .on('mousemove', function(event) {
            const rect = container.getBoundingClientRect();
            let tx = event.clientX - rect.left + 12;
            let ty = event.clientY - rect.top - 10;

            if (tx + 200 > W) tx = event.clientX - rect.left - 210;

            tooltip.style.left = tx + 'px';
            tooltip.style.top = ty + 'px';
          })
          .on('mouseout', function() {
            tooltip.classList.remove('visible');
            d3.select(this).attr('r', 3);
          });
      });

      const champion = series[0];
      const champColor = COLORS[0];

      g.append('text')
        .attr('class', 'leader-badge')
        .attr('x', x(n - 1) + 6)
        .attr('y', y(champion.final_points) + 4)
        .text('WDC')
        .style('fill', champColor)
        .style('font-size', '8px');

      const p1 = champion.final_points;
      const p2 = series[1].final_points;

      document.getElementById('stat-champion').textContent = champion.driver.split(' ').pop();
      document.getElementById('stat-margin').textContent = Math.round(p1 - p2) + ' pts';
      document.getElementById('stat-races').textContent = n;

      series.forEach((s, idx) => {
        const color = COLORS[idx % COLORS.length];

        const item = document.createElement('div');
        item.className = 'driver-item';

        item.innerHTML = `
          <div class="driver-swatch" style="background:${color}"></div>
          <div class="driver-info">
            <div class="driver-name">${s.driver}</div>
            <div class="driver-team">${s.constructor}</div>
          </div>
          <div class="driver-pts" style="color:${color}">${Math.round(s.final_points)}</div>
        `;

        item.addEventListener('click', () => toggleDriver(idx, item));

        legend.appendChild(item);
      });
    }

    function toggleDriver(idx, item) {
      const lines = document.querySelectorAll('.race-line');
      const dots = document.querySelectorAll('.dot');
      const items = document.querySelectorAll('.driver-item');

      if (dimmedDrivers.has(idx)) {
        dimmedDrivers.delete(idx);
        item.classList.remove('dimmed');
      } else {
        dimmedDrivers.add(idx);
        item.classList.add('dimmed');
      }

      lines.forEach((line, i) => {
        line.classList.toggle('dimmed', dimmedDrivers.has(i));
      });

      document.querySelectorAll('[class*="dot-"]').forEach(dot => {
        const cls = [...dot.classList].find(c => c.startsWith('dot-'));
        if (cls) {
          const i = parseInt(cls.replace('dot-', ''));
          dot.classList.toggle('dimmed', dimmedDrivers.has(i));
        }
      });
    }

    const select = document.getElementById('season-select');

    Object.keys(DATA)
      .filter(y => parseInt(y) >= 2014)
      .sort((a, b) => b - a)
      .forEach(y => {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
      /*  if (y === '2024') opt.selected = true; */
        if (y === '{{ year }}') opt.selected = true;
        select.appendChild(opt);
      });

  /* original event listener. updated one below reloads page whenver selection changes 
  so CSI is re-rendered
  select.addEventListener('change', () => render(select.value));
  */
    select.addEventListener('change', () => window.location.href = `/historical-progression?year=${select.value}`);

  /*  render('2024'); */
  render('{{ year }}');

    window.addEventListener('resize', () => render(select.value));
  </script>
